name: my_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.5
  shimmer: ^3.0.0
  provider: ^6.1.5+1
  flutter_svg: ^2.0.10+1
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.1
  flutter_map: ^8.2.0 # For displaying the OSM map
  http: ^1.6.0 # For calling the search API
  latlong2: ^0.9.0
  fluttertoast: ^9.0.0
  google_generative_ai: ^0.4.6
  geolocator: ^13.0.0
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  image_picker: ^1.1.2
  intl: ^0.19.0
  supabase_flutter: ^2.8.3
  archive: ^4.0.9
  csv: ^6.0.0
  file_picker: ^10.3.10
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-01.png"
